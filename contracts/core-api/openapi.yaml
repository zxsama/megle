openapi: 3.1.0
info:
  title: Megle Core API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:{port}/api
    variables:
      port:
        default: "47321"
security:
  - sessionToken: []
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Core is alive.
  /roots:
    get:
      operationId: listRoots
      responses:
        "200":
          description: Existing indexed roots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootListResponse"
    post:
      operationId: addRoot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRootRequest"
      responses:
        "202":
          description: Root accepted and scan task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "400":
          description: Root path does not exist, cannot be opened, or is not a directory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roots/{rootId}:
    delete:
      operationId: removeRoot
      parameters:
        - $ref: "#/components/parameters/rootId"
      responses:
        "202":
          description: Root disabled or removed from index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Root not found or already disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /folders/{folderId}/children:
    get:
      operationId: listFolderChildren
      parameters:
        - $ref: "#/components/parameters/folderId"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Child folders for lazy folder-tree loading.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
        "400":
          description: Invalid folder children cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media:
    get:
      operationId: listMedia
      parameters:
        - $ref: "#/components/parameters/rootIdQuery"
        - $ref: "#/components/parameters/folderIdQuery"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: sort
          in: query
          schema:
            type: string
            enum: [mtime_desc, mtime_asc, name_asc, name_desc]
            default: mtime_desc
        - name: kind
          in: query
          schema:
            type: string
            enum: [image, video, other]
      responses:
        "200":
          description: Keyset-paged media result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "400":
          description: Invalid media query parameter or cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}:
    get:
      operationId: getMedia
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: Single media item and derived metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRecord"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/thumbnail:
    get:
      operationId: getThumbnail
      parameters:
        - $ref: "#/components/parameters/fileId"
        - $ref: "#/components/parameters/target"
        - $ref: "#/components/parameters/thumbnailPriority"
      responses:
        "200":
          description: Thumbnail state is ready or terminal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailResponse"
        "202":
          description: Thumbnail is pending or queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailResponse"
        "400":
          description: Unsupported thumbnail target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/thumbnail/blob:
    get:
      operationId: getThumbnailBlob
      parameters:
        - $ref: "#/components/parameters/fileId"
        - $ref: "#/components/parameters/target"
      responses:
        "200":
          description: Generated thumbnail bytes (WebP).
          headers:
            x-megle-served-by:
              schema:
                type: string
                enum: [db_blob]
          content:
            image/webp:
              schema:
                type: string
                format: binary
        "400":
          description: Thumbnail not ready or unsupported target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media item or thumbnail BLOB not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/preview:
    get:
      operationId: getPreview
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: Original indexed media bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Media item or source file not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks:
    get:
      operationId: listTasks
      responses:
        "200":
          description: Background task list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
  /tasks/scan:
    post:
      operationId: enqueueScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanTaskRequest"
      responses:
        "202":
          description: Scan task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Root not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Root is disabled and cannot be scanned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/interactive-folder-scan:
    post:
      operationId: enqueueInteractiveFolderScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteractiveFolderScanTaskRequest"
      responses:
        "202":
          description: Interactive folder scan task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Folder cannot be scanned from its current source state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/thumbnail-priority-scope:
    post:
      operationId: syncThumbnailPriorityScope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThumbnailPriorityScopeSyncRequest"
      responses:
        "202":
          description: Pending thumbnail priorities rebalanced for the current root scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Root not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/cancel:
    post:
      operationId: cancelTask
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: Task cancellation accepted and persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Task is already finished and cannot be cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/retry:
    post:
      operationId: retryTask
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "202":
          description: Failed or cancelled task reset to a pending retry attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Task cannot be retried from its current status or source state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /file-ops/rename:
    post:
      operationId: renameFileOp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameRequest"
      responses:
        "200":
          description: Rename succeeded; returns the persisted operation log row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileOperationRecord"
        "400":
          description: Invalid name or request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: File or folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Target name already exists in the same folder.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /file-ops/move:
    post:
      operationId: moveFileOps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveRequest"
      responses:
        "200":
          description: Move succeeded; returns one operation log row per item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileOperationsResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: File, folder, or target folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Target conflict or cross_root move.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /file-ops/delete:
    post:
      operationId: deleteFileOps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequest"
      responses:
        "200":
          description: Delete succeeded; returns one operation log row per item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileOperationsResponse"
        "400":
          description: Invalid request (no targets specified).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: File or folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /file-ops:
    get:
      operationId: listFileOperations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Recent file operations, ordered by id DESC.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileOperationListResponse"
        "400":
          description: Invalid limit or cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tags:
    get:
      operationId: listTags
      responses:
        "200":
          description: All known tags ordered by name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
    post:
      operationId: createTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagRecord"
        "400":
          description: Invalid tag name or color.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tag with this name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tags/{tagId}:
    delete:
      operationId: deleteTag
      parameters:
        - $ref: "#/components/parameters/tagId"
      responses:
        "200":
          description: Tag deleted; file_tags rows are removed by cascade.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTagResponse"
        "404":
          description: Tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/metadata:
    get:
      operationId: getUserMetadata
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: User metadata for the file (default record if none persisted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMetadataRecord"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUserMetadata
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserMetadataUpdate"
      responses:
        "200":
          description: Updated user metadata for the file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMetadataRecord"
        "400":
          description: Invalid rating, note length, or payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/tags:
    put:
      operationId: setFileTags
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFileTagsRequest"
      responses:
        "200":
          description: Replaced tag set for the file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTagsResponse"
        "404":
          description: Media item or tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addFileTag
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFileTagRequest"
      responses:
        "200":
          description: Tag added; returns the resulting tag set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTagsResponse"
        "404":
          description: Media item or tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/tags/{tagId}:
    delete:
      operationId: removeFileTag
      parameters:
        - $ref: "#/components/parameters/fileId"
        - $ref: "#/components/parameters/tagId"
      responses:
        "200":
          description: Tag removed; returns the resulting tag set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTagsResponse"
        "404":
          description: Media item or tag association not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    get:
      operationId: searchMedia
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/rootIdQuery"
        - $ref: "#/components/parameters/folderIdQuery"
        - name: kind
          in: query
          schema:
            type: string
            enum: [image, video, other]
        - name: minRating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: favorite
          in: query
          schema:
            type: boolean
        - name: tagId
          in: query
          description: Repeatable; results must match ALL provided tag ids.
          schema:
            type: array
            items:
              type: integer
              minimum: 1
          style: form
          explode: true
        - name: sort
          in: query
          schema:
            type: string
            enum:
              [
                mtime_desc,
                mtime_asc,
                name_asc,
                name_desc,
                rating_desc,
                rating_asc
              ]
            default: mtime_desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Keyset-paged search result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "400":
          description: Invalid search query parameter or cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugins:
    get:
      operationId: listPlugins
      responses:
        "200":
          description: Installed plugin states.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginListResponse"
  /plugins/discover:
    post:
      operationId: discoverPlugins
      responses:
        "202":
          description: Plugin folder rescan completed; returns counts and per-manifest errors.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginDiscoveryResponse"
  /plugins/{pluginId}:
    get:
      operationId: getPlugin
      parameters:
        - $ref: "#/components/parameters/pluginId"
      responses:
        "200":
          description: Plugin record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "404":
          description: Plugin not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePlugin
      parameters:
        - $ref: "#/components/parameters/pluginId"
      responses:
        "200":
          description: Plugin row removed; on-disk folder is left untouched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePluginResponse"
        "404":
          description: Plugin not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugins/{pluginId}/enable:
    post:
      operationId: enablePlugin
      parameters:
        - $ref: "#/components/parameters/pluginId"
      responses:
        "200":
          description: Plugin enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "404":
          description: Plugin not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Plugin manifest is invalid and cannot be enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugins/{pluginId}/disable:
    post:
      operationId: disablePlugin
      parameters:
        - $ref: "#/components/parameters/pluginId"
      responses:
        "200":
          description: Plugin disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginRecord"
        "404":
          description: Plugin not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    sessionToken:
      type: apiKey
      in: header
      name: X-Megle-Session
  parameters:
    rootId:
      name: rootId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    folderId:
      name: folderId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    fileId:
      name: fileId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    taskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    tagId:
      name: tagId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    pluginId:
      name: pluginId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    rootIdQuery:
      name: rootId
      in: query
      schema:
        type: integer
        minimum: 1
    folderIdQuery:
      name: folderId
      in: query
      schema:
        type: integer
        minimum: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 200
    cursor:
      name: cursor
      in: query
      schema:
        type: string
    target:
      name: target
      in: query
      schema:
        type: string
        enum: [grid_320]
        default: grid_320
    thumbnailPriority:
      name: priority
      in: query
      schema:
        $ref: "#/components/schemas/ThumbnailPriority"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ScanSummary:
      type: object
      required: [foldersSeen, mediaFilesSeen, skippedFiles]
      properties:
        foldersSeen:
          type: integer
          minimum: 0
        mediaFilesSeen:
          type: integer
          minimum: 0
        skippedFiles:
          type: integer
          minimum: 0
    AddRootRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
        displayName:
          type: string
    AcceptedRootResponse:
      type: object
      required: [accepted, taskId, rootId, scan]
      properties:
        accepted:
          type: boolean
        taskId:
          type: integer
          nullable: true
        rootId:
          type: integer
          nullable: true
        scan:
          anyOf:
            - $ref: "#/components/schemas/ScanSummary"
            - type: "null"
    ScanTaskRequest:
      type: object
      required: [rootId]
      properties:
        rootId:
          type: integer
          minimum: 1
    InteractiveFolderScanTaskRequest:
      type: object
      required: [folderId]
      properties:
        folderId:
          type: integer
          minimum: 1
    ThumbnailPriorityScopeSyncRequest:
      type: object
      required: [rootId, selectedFileIds, visibleFileIds, aheadFileIds]
      properties:
        rootId:
          type: integer
          minimum: 1
        selectedFileIds:
          type: array
          items:
            type: integer
            minimum: 1
        visibleFileIds:
          type: array
          items:
            type: integer
            minimum: 1
        aheadFileIds:
          type: array
          items:
            type: integer
            minimum: 1
    ThumbnailPriority:
      type: string
      enum: [background, ahead, visible, selected]
    TaskKind:
      type: string
      enum: [root_scan, interactive_folder_scan, thumbnail]
    TaskStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled]
    TaskRecord:
      type: object
      required:
        [
          id,
          kind,
          priority,
          status,
          rootId,
          folderId,
          fileId,
          createdAt,
          updatedAt,
          itemsSeen,
          itemsTotal,
          foldersSeen,
          mediaFilesSeen,
          skippedFiles,
          error
        ]
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/TaskKind"
        priority:
          type: integer
        status:
          $ref: "#/components/schemas/TaskStatus"
        rootId:
          type: integer
          nullable: true
        folderId:
          type: integer
          nullable: true
        fileId:
          type: integer
          nullable: true
        createdAt:
          type: integer
        updatedAt:
          type: integer
        itemsSeen:
          type: integer
          minimum: 0
        itemsTotal:
          type: integer
