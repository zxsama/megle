openapi: 3.1.0
info:
  title: Megle Core API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:{port}/api
    variables:
      port:
        default: "47321"
security:
  - sessionToken: []
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Core is alive.
  /roots:
    get:
      operationId: listRoots
      responses:
        "200":
          description: Existing indexed roots.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootListResponse"
    post:
      operationId: addRoot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRootRequest"
      responses:
        "202":
          description: Root accepted and scan task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "400":
          description: Root path does not exist, cannot be opened, or is not a directory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roots/{rootId}:
    delete:
      operationId: removeRoot
      parameters:
        - $ref: "#/components/parameters/rootId"
      responses:
        "202":
          description: Root disabled or removed from index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Root not found or already disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /folders/{folderId}/children:
    get:
      operationId: listFolderChildren
      parameters:
        - $ref: "#/components/parameters/folderId"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Child folders for lazy folder-tree loading.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
        "400":
          description: Invalid folder children cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Folder not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media:
    get:
      operationId: listMedia
      parameters:
        - $ref: "#/components/parameters/rootIdQuery"
        - $ref: "#/components/parameters/folderIdQuery"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - name: sort
          in: query
          schema:
            type: string
            enum: [mtime_desc, mtime_asc, name_asc, name_desc]
            default: mtime_desc
        - name: kind
          in: query
          schema:
            type: string
            enum: [image, video, other]
      responses:
        "200":
          description: Keyset-paged media result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "400":
          description: Invalid media query parameter or cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}:
    get:
      operationId: getMedia
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: Single media item and derived metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRecord"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/thumbnail:
    get:
      operationId: getThumbnail
      parameters:
        - $ref: "#/components/parameters/fileId"
        - $ref: "#/components/parameters/profile"
      responses:
        "200":
          description: Thumbnail state is ready or terminal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailResponse"
        "202":
          description: Thumbnail is pending or queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThumbnailResponse"
        "400":
          description: Unsupported thumbnail profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/preview:
    get:
      operationId: getPreview
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: Preview resource information.
        "202":
          description: Preview generation queued.
  /tasks:
    get:
      operationId: listTasks
      responses:
        "200":
          description: Background task list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
  /tasks/scan:
    post:
      operationId: enqueueScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanTaskRequest"
      responses:
        "202":
          description: Scan task queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Root not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Root is disabled and cannot be scanned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/cancel:
    post:
      operationId: cancelTask
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: Task cancellation accepted and persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Task is already finished and cannot be cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{taskId}/retry:
    post:
      operationId: retryTask
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "202":
          description: Failed or cancelled task reset to a pending retry attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedRootResponse"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Task cannot be retried from its current status or source state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /file-ops/rename:
    post:
      operationId: renameFile
      responses:
        "202":
          description: Rename task accepted.
  /file-ops/move:
    post:
      operationId: moveFiles
      responses:
        "202":
          description: Move task accepted.
  /file-ops/delete:
    post:
      operationId: deleteFiles
      responses:
        "202":
          description: Delete task accepted.
  /tags:
    get:
      operationId: listTags
      responses:
        "200":
          description: All known tags ordered by name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
    post:
      operationId: createTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagRecord"
        "400":
          description: Invalid tag name or color.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tag with this name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tags/{tagId}:
    delete:
      operationId: deleteTag
      parameters:
        - $ref: "#/components/parameters/tagId"
      responses:
        "200":
          description: Tag deleted; file_tags rows are removed by cascade.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTagResponse"
        "404":
          description: Tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/metadata:
    get:
      operationId: getUserMetadata
      parameters:
        - $ref: "#/components/parameters/fileId"
      responses:
        "200":
          description: User metadata for the file (default record if none persisted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMetadataRecord"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUserMetadata
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserMetadataUpdate"
      responses:
        "200":
          description: Updated user metadata for the file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMetadataRecord"
        "400":
          description: Invalid rating, note length, or payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/tags:
    put:
      operationId: setFileTags
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFileTagsRequest"
      responses:
        "200":
          description: Replaced tag set for the file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTagsResponse"
        "404":
          description: Media item or tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addFileTag
      parameters:
        - $ref: "#/components/parameters/fileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFileTagRequest"
      responses:
        "200":
          description: Tag added; returns the resulting tag set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTagsResponse"
        "404":
          description: Media item or tag not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /media/{fileId}/tags/{tagId}:
    delete:
      operationId: removeFileTag
      parameters:
        - $ref: "#/components/parameters/fileId"
        - $ref: "#/components/parameters/tagId"
      responses:
        "200":
          description: Tag removed; returns the resulting tag set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTagsResponse"
        "404":
          description: Media item or tag association not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    get:
      operationId: searchMedia
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/rootIdQuery"
        - $ref: "#/components/parameters/folderIdQuery"
        - name: kind
          in: query
          schema:
            type: string
            enum: [image, video, other]
        - name: minRating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: favorite
          in: query
          schema:
            type: boolean
        - name: tagId
          in: query
          description: Repeatable; results must match ALL provided tag ids.
          schema:
            type: array
            items:
              type: integer
              minimum: 1
          style: form
          explode: true
        - name: sort
          in: query
          schema:
            type: string
            enum:
              [
                mtime_desc,
                mtime_asc,
                name_asc,
                name_desc,
                rating_desc,
                rating_asc
              ]
            default: mtime_desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Keyset-paged search result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "400":
          description: Invalid search query parameter or cursor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugins:
    get:
      operationId: listPlugins
      responses:
        "200":
          description: Installed plugin states.
components:
  securitySchemes:
    sessionToken:
      type: apiKey
      in: header
      name: X-Megle-Session
  parameters:
    rootId:
      name: rootId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    folderId:
      name: folderId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    fileId:
      name: fileId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    taskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    tagId:
      name: tagId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    rootIdQuery:
      name: rootId
      in: query
      schema:
        type: integer
        minimum: 1
    folderIdQuery:
      name: folderId
      in: query
      schema:
        type: integer
        minimum: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 200
    cursor:
      name: cursor
      in: query
      schema:
        type: string
    profile:
      name: profile
      in: query
      schema:
        type: string
        enum: [grid_320]
        default: grid_320
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ScanSummary:
      type: object
      required: [foldersSeen, mediaFilesSeen, skippedFiles]
      properties:
        foldersSeen:
          type: integer
          minimum: 0
        mediaFilesSeen:
          type: integer
          minimum: 0
        skippedFiles:
          type: integer
          minimum: 0
    AddRootRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
        displayName:
          type: string
    AcceptedRootResponse:
      type: object
      required: [accepted, taskId, rootId, scan]
      properties:
        accepted:
          type: boolean
        taskId:
          type: integer
          nullable: true
        rootId:
          type: integer
          nullable: true
        scan:
          anyOf:
            - $ref: "#/components/schemas/ScanSummary"
            - type: "null"
    ScanTaskRequest:
      type: object
      required: [rootId]
      properties:
        rootId:
          type: integer
          minimum: 1
    TaskKind:
      type: string
      enum: [root_scan, thumbnail]
    TaskStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled]
    TaskRecord:
      type: object
      required:
        [
          id,
          kind,
          priority,
          status,
          rootId,
          fileId,
          createdAt,
          updatedAt,
          itemsSeen,
          itemsTotal,
          foldersSeen,
          mediaFilesSeen,
          skippedFiles,
          error
        ]
      properties:
        id:
          type: integer
        kind:
          $ref: "#/components/schemas/TaskKind"
        priority:
          type: integer
        status:
          $ref: "#/components/schemas/TaskStatus"
        rootId:
          type: integer
          nullable: true
        fileId:
          type: integer
          nullable: true
        createdAt:
          type: integer
        updatedAt:
          type: integer
        itemsSeen:
          type: integer
          minimum: 0
        itemsTotal:
          type: integer
          nullable: true
          minimum: 0
        foldersSeen:
          type: integer
          minimum: 0
        mediaFilesSeen:
          type: integer
          minimum: 0
        skippedFiles:
          type: integer
          minimum: 0
        error:
          type: string
          nullable: true
    TaskListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TaskRecord"
        nextCursor:
          type: string
          nullable: true
    RootRecord:
      type: object
      required: [id, path, displayName, enabled, createdAt, lastScanAt, rootFolderId]
      properties:
        id:
          type: integer
        path:
          type: string
        displayName:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: integer
        lastScanAt:
          type: integer
          nullable: true
        rootFolderId:
          type: integer
          nullable: true
    RootListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RootRecord"
        nextCursor:
          type: string
          nullable: true
    FolderRecord:
      type: object
      required: [id, rootId, parentId, name, status]
      properties:
        id:
          type: integer
        rootId:
          type: integer
        parentId:
          type: integer
          nullable: true
        name:
          type: string
        status:
          type: string
    FolderListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FolderRecord"
        nextCursor:
          type: string
          nullable: true
    MediaRecord:
      type: object
      required: [id, rootId, folderId, name, ext, size, mtime]
      properties:
        id:
          type: integer
        rootId:
          type: integer
        folderId:
          type: integer
        name:
          type: string
        ext:
          type: string
        size:
          type: integer
        mtime:
          type: integer
        kind:
          type: string
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        durationMs:
          type: integer
          nullable: true
        codec:
          type: string
          nullable: true
        thumbnailState:
          type: string
          nullable: true
        thumbnailCacheKey:
          type: string
          nullable: true
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 5
        favorite:
          type: boolean
          default: false
        note:
          type: string
          nullable: true
        tagIds:
          type: array
          items:
            type: integer
            minimum: 1
    ThumbnailAsset:
      type: object
      required: [cacheKey, width, height, byteSize]
      properties:
        cacheKey:
          type: string
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        byteSize:
          type: integer
          minimum: 1
    ThumbnailResponse:
      type: object
      required: [fileId, profile, state, shortSidePx, outputFormat, asset, error, updatedAt]
      properties:
        fileId:
          type: integer
          minimum: 1
        profile:
          type: string
          enum: [grid_320]
        state:
          type: string
          enum: [pending, queued, ready, failed, skipped_small]
        shortSidePx:
          type: integer
          minimum: 320
          maximum: 320
        outputFormat:
          type: string
          enum: [image/webp]
        asset:
          anyOf:
            - $ref: "#/components/schemas/ThumbnailAsset"
            - type: "null"
        error:
          type: string
          nullable: true
        updatedAt:
          type: integer
          nullable: true
    MediaListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaRecord"
        nextCursor:
          type: string
          nullable: true
    TagRecord:
      type: object
      required: [id, name, color]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          nullable: true
    TagListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TagRecord"
    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string
          nullable: true
    DeleteTagResponse:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: boolean
    UserMetadataRecord:
      type: object
      required: [fileId, rating, favorite, note, tagIds, updatedAt]
      properties:
        fileId:
          type: integer
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 5
        favorite:
          type: boolean
        note:
          type: string
          nullable: true
        tagIds:
          type: array
          items:
            type: integer
            minimum: 1
        updatedAt:
          type: integer
    UserMetadataUpdate:
      type: object
      properties:
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 5
        favorite:
          type: boolean
        note:
          type: string
          nullable: true
    FileTagsResponse:
      type: object
      required: [fileId, tagIds]
      properties:
        fileId:
          type: integer
        tagIds:
          type: array
          items:
            type: integer
            minimum: 1
    AddFileTagRequest:
      type: object
      required: [tagId]
      properties:
        tagId:
          type: integer
          minimum: 1
    SetFileTagsRequest:
      type: object
      required: [tagIds]
      properties:
        tagIds:
          type: array
          items:
            type: integer
            minimum: 1
